schema_version: 3
locale: 'en-us'
prefix: '<#A4A4A4>[<#50CBAB>LoriTime<#A4A4A4>] '
messages:
  unit:
    second:
      singular: 'second'
      plural: 'seconds'
      identifier: [ 's', 'sec' ]
    minute:
      singular: 'minute'
      plural: 'minutes'
      identifier: [ 'min', 'm' ]
    hour:
      singular: 'hour'
      plural: 'hours'
      identifier: [ 'h' ]
    day:
      singular: 'day'
      plural: 'days'
      identifier: [ 'd' ]
    week:
      singular: 'week'
      plural: 'weeks'
      identifier: [ 'w' ]
    month:
      singular: 'month'
      plural: 'months'
      identifier: [ 'mo' ]
    year:
      singular: 'year'
      plural: 'years'
      identifier: [ 'y', 'yhr' ]
  message:
    noPermission: '<#FF3232>You don''t have the required permissions to do that.'
    error: '<#FF3232>An error occurred.'
    command:
      loritime:
        usage: '<#A4A4A4>Use <red>/loritime [player] [server:<server>|s:<server>] [world:<world>|w:<world>] [time:<range>|t:<range>] <#A4A4A4>to see a player''s online time.'
        notFound: '<#A4A4A4>The player <#50CBAB>[player] <#A4A4A4>has not played on the server yet.'
        noScopedTime: '<#A4A4A4>The player <#50CBAB>[player] <#A4A4A4>has no stored online time [scope][range].'
        consoleSelf: '<#FF3232>You''re the console. You can not lookup your online time!'
        scope:
          global: '<#A4A4A4>on the network'
          server: '<#A4A4A4>on the server <#50CBAB>[server]'
          world: '<#A4A4A4>on the world <#50CBAB>[world]'
          worldServer: '<#A4A4A4>on the world <#50CBAB>[world] <#A4A4A4>on server <#50CBAB>[server]'
        range: ' <#A4A4A4>during <#50CBAB>[range]'
        timeSeen:
          self: '<#A4A4A4>You have played for <#50CBAB>[time] [scope][range]<#A4A4A4>.'
          other: '<#A4A4A4>The player <#50CBAB>[player] <#A4A4A4>has already played for <#50CBAB>[time] [scope][range]<#A4A4A4>.'
      loritimeadmin:
        usage: '<#A4A4A4>Use <red>/ltmodify [add | set | reset] [player] [time] [server:<server>|s:<server>] [world:<world>|w:<world>] <#A4A4A4>to edit a player''s online time.<newline>Other commands: <red>/loritimeadmin [reload | update | storage | transfer | deleteHistory | confirm]'
        missingUuid: '<#A4A4A4>The player <#50CBAB>[player] <#A4A4A4>is unknown.'
        notTime: '<#A4A4A4>The given time argument <red>[argument] <#FF3232>is not valid.'
        set:
          usage: '<#A4A4A4>Use <red>/ltmodify set [player] [time] [server:<server>|s:<server>] [world:<world>|w:<world>] <#A4A4A4>to set a player''s online time.'
          success: '<#A4A4A4>The online time of player <#50CBAB>[player] <#A4A4A4>got successfully set to <#50CBAB>[time].'
          negativeTime: '<red>The given time <#50CBAB>[time] <red>is negative, but must at least be zero.'
        modify:
          usage: '<#A4A4A4>Use <red>/ltmodify add [player] [time] [server:<server>|s:<server>] [world:<world>|w:<world>] <#A4A4A4>to modify a player''s online time.'
          success: '<#A4A4A4>The online time of player <#50CBAB>[player] <#A4A4A4>got successfully modified by <#50CBAB>[time].'
          negativeTimeSum: '<red>The given time <#50CBAB>[time] <red>would cause a negative online time, but must at least be zero.'
        reset:
          usage: '<#A4A4A4>Use <red>/ltmodify reset [player] [server:<server>|s:<server>] [world:<world>|w:<world>] <#A4A4A4>to reset a player''s online time.'
          success: '<#A4A4A4>The online time of player <#50CBAB>[player] <#A4A4A4>got successfully reset.'
        deleteUser:
          usage: '<#A4A4A4>Use <red>/onlinetimeadmin delete [player] confirm <#A4A4A4>to delete a user entirely from the plugin.'
          success: '<#A4A4A4>The player <#50CBAB>[player] <#A4A4A4>was <#50CBAB>successfully <#A4A4A4>deleted.'
          issue: '<#FF3232>An issue occurred during the deletion.'
          userOnline: '<#FF3232>You can not delete a user that is online.'
        reload:
          usage: '<#A4A4A4> Use <red>/onlinetimeadmin reload <#A4A4A4>to reload the plugin.'
          success: '<#A4A4A4>You have <#1AFA29>successfully <#A4A4A4>reloaded the plugin.'
          issue: '<#FF3232>An issue occurred during plugin reload, the plugin will stop counting!'
        transfer:
          usage: '<#A4A4A4>Use <red>/loritimeadmin transfer [player] server:<source> [world:<source>] to-server:<target> [to-world:<target>] [time:<range>] <#A4A4A4>to preview moving scoped data. Omit player to move all players.'
          preview: '<#A4A4A4>Transfer preview for <#50CBAB>[player]<#A4A4A4>: <#50CBAB>[source] <#A4A4A4>to <#50CBAB>[target]<#A4A4A4>, range <#50CBAB>[range]<#A4A4A4>, <#50CBAB>[sessions] <#A4A4A4>sessions, <#50CBAB>[adjustments] <#A4A4A4>adjustments, <#50CBAB>[players] <#A4A4A4>players, merge <#50CBAB>[merge]<#A4A4A4>. Use <red>/lta confirm <#A4A4A4>within 15 seconds to apply.'
          warning: '<#FF3232>WARNING: This transfer rewrites stored history and cannot be reverted by LoriTime. Create and verify a backup before running /lta confirm.'
          success: '<#1AFA29>Transfer completed: <#50CBAB>[sessions] <#1AFA29>sessions, <#50CBAB>[adjustments] <#1AFA29>adjustments, <#50CBAB>[players] <#1AFA29>players.'
          failure: '<#FF3232>Storage transfer failed.'
        storage:
          transfer:
            usage: '<#A4A4A4>Use <red>/loritimeadmin storage transfer [sqlite|mysql|mariadb] <#A4A4A4>to preview copying all LoriTime data to an empty target storage.'
            preview: '<#A4A4A4>Storage transfer preview: <#50CBAB>[source] <#A4A4A4>to <#50CBAB>[target]<#A4A4A4>, <#50CBAB>[sessions] <#A4A4A4>sessions, <#50CBAB>[adjustments] <#A4A4A4>adjustments, <#50CBAB>[players] <#A4A4A4>players. Use <red>/lta confirm <#A4A4A4>within 15 seconds to apply.'
            warning: '<#FF3232>WARNING: The target storage must be empty. Create and verify a backup before running /lta confirm.'
            success: '<#1AFA29>Storage transfer to <#50CBAB>[target] <#1AFA29>completed: <#50CBAB>[sessions] <#1AFA29>sessions, <#50CBAB>[adjustments] <#1AFA29>adjustments, <#50CBAB>[players] <#1AFA29>players.'
            targetNotEmpty: '<#FF3232>The target storage is not empty. Use a fresh target before running storage transfer.'
            unknownTarget: '<#FF3232>Unknown storage target. Use sqlite, mysql, or mariadb.'
            sameTarget: '<#FF3232>Source and target storage types must be different.'
            sqlBridgeRequired: '<#FF3232>Direct SQL-to-SQL transfer is not supported with the current single SQL config. Transfer to sqlite first, change SQL config, then transfer from sqlite to the SQL target.'
            failure: '<#FF3232>Storage type transfer failed.'
        deleteHistory:
          usage: '<#A4A4A4>Use <red>/loritimeadmin deleteHistory [player] server:<source> [world:<source>] [time:<range>] <#A4A4A4>to preview deleting scoped history. Omit player to delete matching history for all players.'
          preview: '<#A4A4A4>DeleteHistory preview for <#50CBAB>[player]<#A4A4A4>: scope <#50CBAB>[scope]<#A4A4A4>, range <#50CBAB>[range]<#A4A4A4>, <#50CBAB>[sessions] <#A4A4A4>sessions, <#50CBAB>[adjustments] <#A4A4A4>adjustments, <#50CBAB>[players] <#A4A4A4>players. Use <red>/lta confirm <#A4A4A4>within 15 seconds to apply.'
          warning: '<#FF3232>WARNING: This delete removes stored history and cannot be reverted by LoriTime. Create and verify a backup before running /lta confirm.'
          success: '<#1AFA29>History deleted: <#50CBAB>[sessions] <#1AFA29>sessions, <#50CBAB>[adjustments] <#1AFA29>adjustments, <#50CBAB>[players] <#1AFA29>players.'
          failure: '<#FF3232>Storage history delete failed.'
        confirm:
          none: '<#FF3232>There is no pending admin action to confirm.'
          expired: '<#FF3232>The pending admin action expired. Run the preview command again.'
          failure: '<#FF3232>The confirmed admin action failed.'
      stats:
        commandUsage: '<#A4A4A4>Use <red>/ltstats [users|sessions|usage|top|afk|retention] [time:<range>|calendar:<period>] [server:<server>] [world:<world>].'
        unsupported: '<#FF3232>Statistics are not supported by the active storage.'
        error: '<#FF3232>Statistics could not be calculated.'
        overview: '<#A4A4A4><newline>Network statistics — <#50CBAB>[range] <#A4A4A4>([scope])<newline>Unique users: <#50CBAB>[unique]<#A4A4A4> | New users: <#50CBAB>[new]<newline><#A4A4A4>Sessions: <#50CBAB>[sessions]<#A4A4A4> | Playtime: <#50CBAB>[playtime]<newline><#A4A4A4>Median: <#50CBAB>[median]<#A4A4A4> | Longest: <#50CBAB>[longest]<#A4A4A4> | Sessions/user: <#50CBAB>[peruser]<newline><#A4A4A4>Bounces: <#50CBAB>[bounces] ([bounce])<#A4A4A4> | Peak: <#50CBAB>[peak]<newline><#A4A4A4>AFK players: <#50CBAB>[afkplayers]<#A4A4A4> | AFK kicks: <#50CBAB>[afkkicks]'
        users: '<#A4A4A4>Users — [range] ([scope])<newline>Unique: <#50CBAB>[unique]<#A4A4A4> | New: <#50CBAB>[new]<#A4A4A4> | 7-day retention: <#50CBAB>[retention]'
        sessions: '<#A4A4A4>Sessions — [range] ([scope])<newline>Total: <#50CBAB>[sessions]<#A4A4A4> | Median: <#50CBAB>[median]<#A4A4A4> | Longest: <#50CBAB>[longest]<newline><#A4A4A4>Per user: <#50CBAB>[peruser]<#A4A4A4> | Bounces: <#50CBAB>[bounces] ([bounce])<#A4A4A4> | Peak: <#50CBAB>[peak]'
        usage: '<#A4A4A4>Usage — [range] ([scope])<newline>[usage]'
        top: '<#A4A4A4>Top playtime — [range] ([scope])<newline>[top]'
        afk: '<#A4A4A4>AFK — [range] ([scope])<newline>Players: <#50CBAB>[afkplayers]<#A4A4A4> | Periods: <#50CBAB>[afkperiods]<#A4A4A4> | Duration: <#50CBAB>[afktime]<#A4A4A4> | Kicks: <#50CBAB>[afkkicks]'
        retention: '<#A4A4A4>Retention — [range] ([scope])<newline>New users: <#50CBAB>[new]<#A4A4A4> | Matured 7-day retention: <#50CBAB>[retention]'
      top:
        usage: '<#A4A4A4>Use <red>/onlinetimetop [page] <#A4A4A4>to see the top online time of the players.'
        gatheringData: '<#A4A4A4>Gather data and start calculate...'
        headline: '<#A4A4A4><newline>Top online times <#50CBAB>[dateAndTime] <newline><#A4A4A4>---- Top times -- Page <#50CBAB>[pages] <#A4A4A4>----<newline>Server total: <#50CBAB>[totalTime]'
        user: '<#A4A4A4>[place]: [player] <#50CBAB>[time]'
        wrongPage: '<#A4A4A4>Please choose a page between <#FF3232>[pages].'
        nonumber: '<#FF3232>The specified value was not a number.'
      debug:
        enabled: '<#A4A4A4>Debugging <#1AFA29>started.'
        disabled: '<#A4A4A4>Debugging <#FF3232>stopped.'
    afk:
      kick: '<#50CBAB>You were kicked for being AFK for <#FF3232>[time].'
      kickAnnounce: '<#50CBAB>[player] <#A4A4A4>was kicked for being AFK for <#50CBAB>[time].'
      afkAnnounce: '<#50CBAB>[player] <#A4A4A4>is now AFK.'
      resumeAnnounce: '<#50CBAB>[player] <#A4A4A4>is no longer AFK.'
      afkSelf: '<#A4A4A4>You are now AFK.'
      afkResume: '<#A4A4A4>You are no longer AFK.'
    updater:
      startUpdate: '<#A4A4A4>Started update process. Searching for a newer version than currently found.'
      available: '<#A4A4A4>An update is available for the plugin.<newline>Current version: <#50CBAB>[currentVersion]<#A4A4A4> | new Version: <#50CBAB>[newVersion]'
      disabled: '<#FF3232>The update check is disabled. Please enable it to check for updates.'
      newerVersionFound: '<#FF3232>Aborted...<newline><#A4A4A4>A newer version is available. New version <#50CBAB>[newVersion]<#A4A4A4>.'
      alreadyDownloaded: '<#FF3232>The update has already been downloaded. Please restart the server to apply the update.'
      notFound: '<#FF3232>No update was found.'
      updateSuccess: '<#1AFA29>Updated successfully to version: <#50CBAB>[newVersion]<#1AFA29>. <#A4A4A4>Restart the server to apply the update.'
    storageMaintenance:
      unsupported: '<#FF3232>Storage maintenance is not supported by the active storage.'
      preview: '<#A4A4A4>Maintenance preview: <#50CBAB>[sessions] <#A4A4A4>sessions, <#50CBAB>[adjustments] <#A4A4A4>adjustments, <#50CBAB>[players] <#A4A4A4>players.'
      confirmationRequired: '<#FF3232>This operation changes existing data. Confirm with token <#50CBAB>[token]<#FF3232>.'
      confirmationMismatch: '<#FF3232>The confirmation no longer matches the current operation preview.'
      success: '<#1AFA29>Storage maintenance completed successfully.'
      failure: '<#FF3232>Storage maintenance failed.'
